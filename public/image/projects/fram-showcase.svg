<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#262c36"/>
      <stop offset="1" stop-color="#1b2027"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="90" y="70" width="1020" height="490" rx="22" fill="#12161c" stroke="#dfd0b826"/>
  <rect x="90" y="70" width="1020" height="54" rx="22" fill="#1b2129"/>
  <rect x="90" y="102" width="1020" height="22" fill="#1b2129"/>
  <circle cx="130" cy="97" r="8" fill="#ff5f57"/>
  <circle cx="156" cy="97" r="8" fill="#febc2e"/>
  <circle cx="182" cy="97" r="8" fill="#28c840"/>
  <text x="600" y="103" text-anchor="middle" font-family="ui-monospace, Menlo, monospace" font-size="17" fill="#dfd0b880">fram — zsh</text>
  <g font-family="ui-monospace, Menlo, monospace" font-size="21">
    <text x="130" y="176" fill="#f4e7c5">$ <tspan fill="#dfd0b8">fram resize input.jpg 128x128 -o avatar.jpg</tspan></text>
    <text x="130" y="216" fill="#dfd0b8b0"><tspan fill="#7ddb8a">✓</tspan> avatar.jpg <tspan fill="#dfd0b8">128x128</tspan> · 14.2 KB · 0.1s</text>
    <text x="130" y="280" fill="#f4e7c5">$ <tspan fill="#dfd0b8">fram gif input.mp4 --fps 12 --width 480 -o clip.gif</tspan></text>
    <text x="130" y="320" fill="#dfd0b8b0"><tspan fill="#7ddb8a">✓</tspan> clip.gif <tspan fill="#dfd0b8">480x270</tspan> · 12 fps · 3.4 MB · 2.8s</text>
    <text x="130" y="384" fill="#f4e7c5">$ <tspan fill="#dfd0b8">fram compress-image photo.png --quality 80 -o photo.webp</tspan></text>
    <text x="130" y="424" fill="#dfd0b8b0"><tspan fill="#7ddb8a">✓</tspan> photo.webp · 4.1 MB <tspan fill="#8ab7db">→</tspan> <tspan fill="#dfd0b8">312 KB</tspan> (-92%)</text>
    <text x="130" y="488" fill="#f4e7c5">$ <tspan fill="#dfd0b8">fram</tspan>  <tspan fill="#dfd0b866">← opens the interactive TUI</tspan></text>
  </g>
  <rect x="130" y="508" width="13" height="24" fill="#f4e7c5">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>
</svg>
